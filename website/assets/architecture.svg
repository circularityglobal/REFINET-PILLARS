<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D3040;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0A1520;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D3040;stop-opacity:1"/>
    </linearGradient>
    <filter id="layerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .layer-box { fill: url(#layerGrad); stroke: #00F0FF; stroke-width: 1.5; rx: 6; }
    .layer-text { fill: #E8F4F8; font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
    .layer-label { fill: #00F0FF; font-family: 'Share Tech Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
    .divider { fill: #4A7A8A; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  </style>

  <!-- Layer 1: Gopher Server -->
  <g filter="url(#layerGlow)">
    <rect class="layer-box" x="50" y="20" width="800" height="56"/>
    <text class="layer-label" x="70" y="38">Layer 1</text>
    <text class="layer-text" x="70" y="58">Gopher Server (TCP:7070)</text>
    <text class="divider" x="310" y="58">|</text>
    <text class="layer-text" x="330" y="58">SQLite Ledger</text>
    <text class="divider" x="480" y="58">|</text>
    <text class="layer-text" x="500" y="58">PID &amp; Crypto (Ed25519)</text>
    <text class="divider" x="710" y="58">|</text>
    <text class="layer-text" x="730" y="58">Mesh + SIWE</text>
  </g>

  <!-- Layer 2: DApp Runtime -->
  <g filter="url(#layerGlow)">
    <rect class="layer-box" x="50" y="96" width="800" height="56"/>
    <text class="layer-label" x="70" y="114">Layer 2</text>
    <text class="layer-text" x="70" y="134">DApp Runtime + EVM RPC Gateway (5 chains)</text>
  </g>

  <!-- Layer 3: Browser Extension -->
  <g filter="url(#layerGlow)">
    <rect class="layer-box" x="50" y="172" width="800" height="56"/>
    <text class="layer-label" x="70" y="190">Layer 3</text>
    <text class="layer-text" x="70" y="210">Browser Extension v0.4.0 (WebSocket Bridge)</text>
  </g>

  <!-- Layer 4: Encrypted Vault -->
  <g filter="url(#layerGlow)">
    <rect class="layer-box" x="50" y="248" width="800" height="56"/>
    <text class="layer-label" x="70" y="266">Layer 4</text>
    <text class="layer-text" x="70" y="286">Encrypted Vault</text>
    <text class="divider" x="250" y="286">|</text>
    <text class="layer-text" x="270" y="286">ZKP Auth</text>
    <text class="divider" x="380" y="286">|</text>
    <text class="layer-text" x="400" y="286">Shamir Recovery</text>
  </g>

  <!-- Layer 5: Transport -->
  <g filter="url(#layerGlow)">
    <rect class="layer-box" x="50" y="324" width="800" height="56"/>
    <text class="layer-label" x="70" y="342">Layer 5</text>
    <text class="layer-text" x="70" y="362">Transport: Wi-Fi Mesh / LAN / Internet / Tor</text>
  </g>

  <!-- Connecting arrows (data flow dots) -->
  <line x1="450" y1="76" x2="450" y2="96" stroke="#00F0FF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="450" y1="152" x2="450" y2="172" stroke="#00F0FF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="450" y1="228" x2="450" y2="248" stroke="#00F0FF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="450" y1="304" x2="450" y2="324" stroke="#00F0FF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
</svg>
