name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -q

  build-windows-exe:
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Windows .exe
        run: python build/build_exe.py

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/refinet-pillar-setup.exe
          retention-days: 1

  build-macos-dmg:
    needs: test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build macOS .dmg
        run: python build/build_dmg.py

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/refinet-pillar.dmg
          retention-days: 1

  build-linux-deb:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Linux .deb
        run: python build/build_deb.py

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/refinet-pillar.deb
          retention-days: 1

  build-linux-appimage:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Linux AppImage
        run: python build/build_appimage.py

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/refinet-pillar.AppImage
          retention-days: 1

  build-android-apk:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Android APK
        run: python build/build_apk.py

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/refinet-pillar.apk
          retention-days: 1

  release:
    needs: [test, build-windows-exe, build-macos-dmg, build-linux-deb, build-linux-appimage, build-android-apk]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download Windows .exe
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/

      - name: Download macOS .dmg
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: Download Linux .deb
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: artifacts/

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: artifacts/

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix=refinet-pillar/ HEAD \
            > "refinet-pillar-${VERSION}.tar.gz"

      - name: Generate checksums
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sha256sum "refinet-pillar-${VERSION}.tar.gz" > CHECKSUMS.txt
          sha256sum artifacts/refinet-pillar-setup.exe >> CHECKSUMS.txt
          sha256sum artifacts/refinet-pillar.dmg >> CHECKSUMS.txt
          sha256sum artifacts/refinet-pillar.deb >> CHECKSUMS.txt
          sha256sum artifacts/refinet-pillar.AppImage >> CHECKSUMS.txt
          sha256sum artifacts/refinet-pillar.apk >> CHECKSUMS.txt
          cat CHECKSUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            refinet-pillar-*.tar.gz
            artifacts/refinet-pillar-setup.exe
            artifacts/refinet-pillar.dmg
            artifacts/refinet-pillar.deb
            artifacts/refinet-pillar.AppImage
            artifacts/refinet-pillar.apk
            CHECKSUMS.txt
          generate_release_notes: true

  publish-pypi:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build twine
          python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --verbose dist/*

  publish-docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            refinet/pillar:${{ steps.version.outputs.VERSION }}
            refinet/pillar:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
