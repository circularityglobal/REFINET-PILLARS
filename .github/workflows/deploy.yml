name: Deploy Bootstrap Pillar

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run test suite
        run: python -m pytest tests/ -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app refinet-pillar
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Set PID secret on Fly
        run: |
          flyctl secrets set \
            REFINET_PID_JSON='${{ secrets.REFINET_PID_JSON }}' \
            --app refinet-pillar
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
